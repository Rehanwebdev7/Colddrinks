<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B8E23"/>
      <stop offset="50%" style="stop-color:#556B2F"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" style="stop-color:rgba(255,255,200,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <rect width="400" height="400" fill="url(#glow)"/>
  <!-- Paper boat shape -->
  <path d="M130 200 L200 130 L270 200Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <path d="M110 200 L200 215 L290 200" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <path d="M110 200 Q150 220 200 215 Q250 220 290 200" fill="rgba(255,255,255,0.08)"/>
  <!-- Mast/flag on boat -->
  <line x1="200" y1="130" x2="200" y2="100" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <path d="M200 100 L220 108 L200 116Z" fill="rgba(255,200,100,0.3)" stroke="rgba(255,200,100,0.4)" stroke-width="1"/>
  <!-- Water waves -->
  <path d="M60 230 Q100 220 140 230 Q180 240 220 230 Q260 220 300 230 Q340 240 380 230" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <path d="M40 250 Q80 240 120 250 Q160 260 200 250 Q240 240 280 250 Q320 260 360 250" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Mango leaves -->
  <path d="M80 100 Q100 80 110 100 Q100 105 85 105Z" fill="rgba(100,180,50,0.3)" stroke="rgba(100,180,50,0.4)" stroke-width="1"/>
  <path d="M300 130 Q320 110 330 130 Q320 135 305 135Z" fill="rgba(100,180,50,0.25)" stroke="rgba(100,180,50,0.35)" stroke-width="1"/>
  <!-- Small mango -->
  <ellipse cx="320" cy="90" rx="18" ry="22" fill="rgba(200,200,50,0.2)" stroke="rgba(200,200,50,0.3)" stroke-width="1"/>
  <!-- Brand text -->
  <text x="200" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="white">Paper Boat</text>
  <text x="200" y="345" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="rgba(255,255,200,0.7)">Aam Panna</text>
  <text x="200" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">Drinks &amp; Memories</text>
</svg>