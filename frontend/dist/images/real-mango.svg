<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#e68a00"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:rgba(255,255,200,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,200,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <rect width="400" height="400" fill="url(#glow)"/>
  <!-- Mango shape -->
  <ellipse cx="135" cy="160" rx="45" ry="55" transform="rotate(-20 135 160)" fill="rgba(255,200,0,0.3)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <!-- Mango leaf -->
  <path d="M155 105 Q170 80 185 95 Q170 100 160 110Z" fill="rgba(0,150,0,0.3)" stroke="rgba(0,180,0,0.4)" stroke-width="1"/>
  <!-- Juice carton -->
  <rect x="190" y="120" width="65" height="170" rx="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <path d="M190 120 L222 98 L255 120Z" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Label on carton -->
  <rect x="198" y="160" width="49" height="30" rx="3" fill="rgba(255,255,255,0.12)"/>
  <text x="222" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.6)">MANGO</text>
  <!-- Juice splash -->
  <path d="M170 250 Q180 230 195 245 Q200 250 210 240 Q215 235 220 245" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
  <!-- Droplets -->
  <circle cx="160" cy="270" r="4" fill="rgba(255,255,255,0.15)"/>
  <circle cx="240" cy="260" r="3" fill="rgba(255,255,255,0.12)"/>
  <circle cx="180" cy="285" r="2.5" fill="rgba(255,255,255,0.1)"/>
  <!-- Brand text -->
  <text x="200" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="white">Real Mango</text>
  <text x="200" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.65)">Pure Fruit Juice</text>
</svg>