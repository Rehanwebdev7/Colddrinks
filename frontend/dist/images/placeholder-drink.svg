<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c757d"/>
      <stop offset="100%" style="stop-color:#343a40"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Generic bottle shape -->
  <path d="M175 310 L175 240 Q162 222 162 205 L162 148 Q162 128 172 118 L172 88 Q172 78 182 78 L218 78 Q228 78 228 88 L228 118 Q238 128 238 148 L238 205 Q238 222 225 240 L225 310 Q225 320 215 320 L185 320 Q175 320 175 310Z" fill="url(#bottle)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <!-- Cap -->
  <rect x="180" y="69" width="40" height="13" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Label area -->
  <rect x="168" y="165" width="64" height="50" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Question mark on label -->
  <text x="200" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.3)">?</text>
  <!-- Bubbles -->
  <circle cx="190" cy="250" r="4" fill="rgba(255,255,255,0.1)"/>
  <circle cx="210" cy="270" r="3" fill="rgba(255,255,255,0.08)"/>
  <circle cx="195" cy="290" r="2.5" fill="rgba(255,255,255,0.06)"/>
  <!-- Brand text -->
  <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.6)">Cold Drink</text>
  <text x="200" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)">Image Not Available</text>
</svg>