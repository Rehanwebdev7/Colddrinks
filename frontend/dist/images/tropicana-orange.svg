<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#cc5500"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="30%" r="30%">
      <stop offset="0%" style="stop-color:rgba(255,255,100,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,200,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <rect width="400" height="400" fill="url(#sun)"/>
  <!-- Sun with rays -->
  <circle cx="200" cy="100" r="35" fill="rgba(255,255,100,0.25)" stroke="rgba(255,255,200,0.4)" stroke-width="1.5"/>
  <line x1="200" y1="55" x2="200" y2="40" stroke="rgba(255,255,200,0.35)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="230" y1="70" x2="240" y2="58" stroke="rgba(255,255,200,0.3)" stroke-width="2" stroke-linecap="round"/>
  <line x1="245" y1="100" x2="260" y2="100" stroke="rgba(255,255,200,0.3)" stroke-width="2" stroke-linecap="round"/>
  <line x1="230" y1="130" x2="240" y2="142" stroke="rgba(255,255,200,0.3)" stroke-width="2" stroke-linecap="round"/>
  <line x1="170" y1="70" x2="160" y2="58" stroke="rgba(255,255,200,0.3)" stroke-width="2" stroke-linecap="round"/>
  <line x1="155" y1="100" x2="140" y2="100" stroke="rgba(255,255,200,0.3)" stroke-width="2" stroke-linecap="round"/>
  <line x1="170" y1="130" x2="160" y2="142" stroke="rgba(255,255,200,0.3)" stroke-width="2" stroke-linecap="round"/>
  <!-- Juice carton shape -->
  <rect x="165" y="155" width="70" height="150" rx="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <!-- Carton top triangle -->
  <path d="M165 155 L200 130 L235 155Z" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Orange slice on carton -->
  <circle cx="200" cy="220" r="22" fill="rgba(255,165,0,0.3)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="200" y1="198" x2="200" y2="242" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="178" y1="220" x2="222" y2="220" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="184" y1="204" x2="216" y2="236" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <line x1="216" y1="204" x2="184" y2="236" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <!-- Brand text -->
  <text x="200" y="355" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="bold" fill="white">Tropicana</text>
  <text x="200" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.7)">100% Orange Juice</text>
</svg>